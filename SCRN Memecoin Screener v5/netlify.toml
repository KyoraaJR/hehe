[build]
  publish = "."

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"

# Runs automatically every 5 minutes, server-side — no browser tab needed.
# Discovers new Solana tokens, scores them, and Web-Push alerts subscribers
# when one passes the strict screening criteria.
[functions."scheduled-scan"]
  schedule = "*/5 * * * *"
