<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <rect width="128" height="128" rx="24" fill="#12130f"/>
  <rect x="4" y="4" width="120" height="120" rx="20" fill="none" stroke="#33362b" stroke-width="2"/>

  <!-- guide line: the path of the token that survives screening -->
  <line x1="64" y1="18" x2="64" y2="104" stroke="#e8a33d" stroke-width="2" stroke-opacity="0.35" stroke-dasharray="1 5" stroke-linecap="round"/>

  <!-- candidate tokens approaching the filter: two get rejected, one (amber, centered) passes -->
  <circle cx="38" cy="16" r="4.5" fill="#c6584a"/>
  <circle cx="90" cy="14" r="4.5" fill="#d4b34a"/>
  <circle cx="64" cy="13" r="5.5" fill="#e8a33d"/>

  <!-- funnel: strict criteria narrows many candidates down to one -->
  <path d="M18,28 L110,28 L73,82 L73,100 L55,100 L55,82 Z"
        fill="#e8a33d" fill-opacity="0.08" stroke="#e8a33d" stroke-width="3.5" stroke-linejoin="round"/>

  <!-- the strict-screening gate line partway down the funnel -->
  <line x1="34" y1="52" x2="94" y2="52" stroke="#8b8b7a" stroke-width="2" stroke-dasharray="2 3" stroke-linecap="round"/>

  <!-- the token that made it through -->
  <circle cx="64" cy="110" r="7" fill="#e8a33d"/>
</svg>
